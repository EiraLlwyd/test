<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
    </head>
<body>
<div id="img">
    <img src="face.png">
</div>

    <section class="count-start">
        <div>
            <h2>When will it be</h2>
            <div class="countdown">
                <div class="dayC">
                    <h3 class="day">00</h3>
                    <h3>days</h3>
                </div>
                <div class="hourC">
                    <h3 class="hour">00</h3>
                    <h3>hours</h3>
                </div>
                <div class="minuteC">
                    <h3 class="minute">00</h3>
                    <h3>minutes</h3>
                </div>
                <div class="secondC">
                    <h3 class="second">00</h3>
                    <h3>seconds</h3>
                </div>
            </div>
        </div>
        <div class="hi">
        <h1>howdy</h1>
        </div>
  
    </section>

    <section id="buttons"> 
        <div id="buttons1">
        <button id="BT1">hello</button>
        <button id="BT2">Hello</button>
        </div>


    </section>
 <script src="script.js"></script>

</body>

</html>
